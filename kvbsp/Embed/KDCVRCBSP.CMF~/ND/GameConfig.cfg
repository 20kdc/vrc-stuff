{
	version: 9,
	// old digipen game, realistically before my time
	// the kvbsp ECL uses it as a cheap debug target that imitates real Unity/VRChat conditions
	// think of it kinda like the MythBusters use of 'analogue' animal meat
	name: "Narbacular Drop",
	"fileformats": [
		{ "format": "Valve" }
	],
	"filesystem": {
		"searchpath": ".",
		// it doesn't really use PAK but I don't want to mess around with seeing what happens if omitted
		"packageformat": { "extension": ".pak", "format": "idpak" }
	},
	"materials": {
		"root": "video",
		"format": { "extensions": [".bmp"], "format": "image" }
	},
	"entities": {
		"definitions": [ "FGDs/NarbacularDrop.fgd" ],
		"defaultcolor": "0.6 0.6 0.6 1.0"
	},
	"tags": {
		"brush": [],
		"brushface": []
	}
}
