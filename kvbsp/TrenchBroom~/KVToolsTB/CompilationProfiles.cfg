{
	"profiles": [
		{
			"name": "KDCBSP compilation flow",
			"tasks": [
				{
					"target": "${WORK_DIR_PATH}/${MAP_BASE_NAME}-compile.map",
					"type": "export"
				},
				{
					"parameters": "-basedir ${GAME_DIR_PATH}/baseq2 -gamedir baseq2 -q2bsp -log 0 -noextendedsurfflags ${WORK_DIR_PATH}/${MAP_BASE_NAME}-compile.map",
					"tool": "TOOL_QBSP",
					"treatNonZeroResultCodeAsError": true,
					"type": "tool"
				},
				{
					"target": "${WORK_DIR_PATH}/${MAP_BASE_NAME}-compile.map",
					"type": "delete"
				}
			],
			"workdir": "${MAP_DIR_PATH}"
		}
	],
	"version": 1
}
